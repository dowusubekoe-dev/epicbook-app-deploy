name: Sync to Azure Repo

on:
  push:
    branches:
      - main

# Resolves Node.js 20 warning for 2026 deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Azure DevOps
        run: |
          # 1. Clean up the remote
          git remote remove azure || true

          # 2. Add the correct URL with the project: epicbook-dual-pipeline
          git remote add azure https://x-token-auth:${{ secrets.AZURE_DEVOPS_PAT }}@dev.azure.com/derekobekoe/epicbook-dual-pipeline/_git/infra-epicbook

          # 3. Push to Azure
          git push azure main --force
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}

# Updated project name to epicbook-dual-pipeline