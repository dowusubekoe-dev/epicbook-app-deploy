name: Sync to Azure Repo

on:
  push:
    branches:
      - main

# Resolves Node.js warning and ensures 2026 compatibility
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Azure DevOps
        run: |
          # 1. Clean up existing remotes to prevent conflicts
          git remote remove azure || true

          # 2. Add the CORRECT URL (Project: epicbook-dual-pipeline | Repo: infra-epicbook)
          git remote add azure https://x-token-auth:${{ secrets.AZURE_DEVOPS_PAT }}@dev.azure.com/derekobekoe/epicbook-dual-pipeline/_git/infra-epicbook

          # 3. Force push the main branch
          git push azure main --force
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}

# Updated project path to epicbook-dual-pipeline