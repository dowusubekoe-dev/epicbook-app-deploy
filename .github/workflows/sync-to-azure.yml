name: Sync to Azure Repo

on:
  push:
    branches:
      - main

# This clears the Node.js warning and ensures compatibility for 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Azure DevOps
        run: |
          # 1. Clean up the remote to prevent 'already exists' errors
          git remote remove azure || true

          # 2. Add the correct Azure DevOps remote
          git remote add azure https://x-token-auth:${{ secrets.AZURE_DEVOPS_PAT }}@dev.azure.com/derekobekoe/infra-epicbook/_git/infra-epicbook

          # 3. Force push to the Azure repository
          git push azure main --force
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}