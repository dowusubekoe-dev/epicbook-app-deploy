---
- name: Deploy The EpicBook Application
  hosts: web
  become: true

  # Variables are loaded from group_vars/all.yml automatically

  roles:
    - common    # System updates, Node.js 20, Python dependencies
    - epicbook  # MySQL 8.0, Native Auth fix, App Clone, SSL Best Practice fix
    - nginx     # Reverse Proxy (Port 80 -> Port 3001)

  post_tasks:
    - name: Final Connectivity Check
      uri:
        url: "http://localhost:{{ app_port }}"
        status_code: 200
      register: app_check
      until: app_check.status == 200
      retries: 5
      delay: 5