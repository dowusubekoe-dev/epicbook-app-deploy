---
- name: Install MySQL Server
  apt:
    name: mysql-server
    state: present

- name: Start and enable MySQL
  service:
    name: mysql
    state: started
    enabled: yes

- name: Configure root for native password authentication
  shell: |
    mysql -e "ALTER USER '{{ db_user }}'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ db_password }}';"
    mysql -e "FLUSH PRIVILEGES;"
  register: mysql_auth_fix
  changed_when: "'Query OK' in mysql_auth_fix.stdout"
  ignore_errors: yes

- name: Create Bookstore database
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"

- name: Clone The EpicBook repository
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dest }}"
    force: yes
    version: main
  become_user: "{{ app_user }}"

- name: Install NPM dependencies
  npm:
    path: "{{ app_dest }}"
  become_user: "{{ app_user }}"

- name: Deploy config and index templates (SSL Fix)
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - { src: 'config.json.j2', dest: "{{ app_dest }}/config/config.json" }
    - { src: 'index.js.j2', dest: "{{ app_dest }}/models/index.js" }
  notify: restart epicbook

- name: Import Database Schema and Seeds (Force)
  shell: |
    mysql -f -u {{ db_user }} -p'{{ db_password }}' {{ db_name }} < {{ app_dest }}/db/BuyTheBook_Schema.sql
    mysql -f -u {{ db_user }} -p'{{ db_password }}' {{ db_name }} < {{ app_dest }}/db/author_seed.sql
    mysql -f -u {{ db_user }} -p'{{ db_password }}' {{ db_name }} < {{ app_dest }}/db/books_seed.sql
  become: true

# ... (MySQL and Clone tasks stay the same) ...

- name: Install PM2 globally (Proper Ansible Way)
  npm:
    name: pm2
    global: yes
    state: present

- name: Ensure PM2 is in the system path
  file:
    src: /usr/bin/pm2
    dest: /usr/local/bin/pm2
    state: link
  ignore_errors: true

- name: Install NPM dependencies for the app
  npm:
    path: "{{ app_dest }}"
  become_user: "{{ app_user }}"

# ... (Templates and Database Import stay the same) ...

- name: Start App with PM2
  shell: |
    # We removed 'npm install -g pm2' from here because it's already done above
    pm2 delete epicbook || true
    PORT={{ app_port }} pm2 start server.js --name "epicbook"
  args:
    chdir: "{{ app_dest }}"
  become_user: "{{ app_user }}"
  environment:
    PM2_HOME: "{{ pm2_home }}"