---
- name: reload nginx
  service:
    name: nginx
    state: reloaded
  become: true
  listen: "reload webserver"

- name: restart epicbook app
  command: pm2 restart epicbook --update-env
  args:
    chdir: "{{ app_dest }}"
  become: true
  become_user: "{{ app_user }}"
  environment:
    PM2_HOME: "{{ pm2_home }}"