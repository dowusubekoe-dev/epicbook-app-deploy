---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default Nginx site to avoid conflicts
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-available/default
  notify: restart nginx

- name: Deploy EpicBook reverse proxy configuration
  template:
    src: theepicbooks.conf.j2
    dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}"
  notify: restart nginx

- name: Test Nginx configuration syntax
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: yes