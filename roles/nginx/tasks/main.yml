---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Wipe all potential conflicting configs
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-available/default
    - /etc/nginx/conf.d/default.conf

- name: Deploy EpicBook config DIRECTLY to conf.d
  template:
    src: theepicbooks.conf.j2
    # Moving to conf.d bypasses the sites-available/enabled headache entirely
    dest: /etc/nginx/conf.d/epicbook.conf
    mode: '0644'

- name: Test Nginx syntax
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Force Restart Nginx
  service:
    name: nginx
    state: restarted
    enabled: yes