---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove ALL potential defaults
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-available/default
    - /etc/nginx/conf.d/default.conf

- name: Deploy EpicBook config
  template:
    src: theepicbooks.conf.j2
    # We use 'default.conf' inside conf.d because Nginx always loads it
    dest: /etc/nginx/conf.d/default.conf
    mode: '0644'

- name: Force Restart Nginx
  service:
    name: nginx
    state: restarted
    enabled: yes