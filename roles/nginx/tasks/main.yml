---
- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Start and enable Nginx service
  service:
    name: nginx
    state: started
    enabled: yes

- name: Remove default Nginx site configuration
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Deploy EpicBook reverse proxy configuration
  template:
    src: theepicbooks.conf.j2
    dest: "/etc/nginx/conf.d/{{ nginx_site_name }}.conf"
  notify: reload nginx

- name: Test Nginx configuration syntax
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Ensure Nginx is running and reloaded
  service:
    name: nginx
    state: started