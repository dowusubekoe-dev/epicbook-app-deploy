---
- name: Ensure Nginx is installed
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove the default config link
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy EpicBook config to sites-available
  template:
    src: theepicbooks.conf.j2
    dest: /etc/nginx/sites-available/epicbook
    mode: '0644'

- name: ACTIVATE the site (The missing step!)
  file:
    src: /etc/nginx/sites-available/epicbook
    dest: /etc/nginx/sites-enabled/epicbook
    state: link
  notify: restart nginx

- name: Ensure Nginx is started
  service:
    name: nginx
    state: started
    enabled: yes