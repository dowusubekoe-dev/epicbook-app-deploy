---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default Nginx symlink
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy EpicBook configuration to sites-available
  template:
    src: theepicbooks.conf.j2
    dest: /etc/nginx/sites-available/epicbook
    mode: '0644'
  notify: restart nginx

- name: Enable EpicBook site by creating symlink
  file:
    src: /etc/nginx/sites-available/epicbook
    dest: /etc/nginx/sites-enabled/epicbook
    state: link
  notify: restart nginx

- name: Test Nginx configuration
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: yes