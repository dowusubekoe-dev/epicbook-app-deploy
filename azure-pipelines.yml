trigger: none

resources:
  pipelines:
    - pipeline: infra
      source: infra-epicbook.git
      trigger: true
  repositories:
    - repository: external_assignment
      type: github
      name: pravinmishraaws/theepicbook
      endpoint: dowusubekoe-dev

variables:
  - group: epicbook-secrets
  # These act as defaults, but can be overridden by the 'infra' pipeline artifact if needed
  - name: vmPublicIp
    value: '20.123.200.55'
  - name: db_host
    value: 'epicbook-mysql-lkjb4a.mysql.database.azure.com'

pool:
  name: 'epicbook-deploy-agent'

steps:
  # 1. We only need the Ansible repo (self)
  - checkout: self
    displayName: 'Checkout Ansible Playbook'

  # 2. Download Terraform/Infra outputs (Optional if you want to dynamic IPs)
  - download: infra
    artifact: infra-outputs
    displayName: 'Get Latest Infra Data'
    continueOnError: true

  # 3. Setup SSH Key (Using the dedicated Task)
  - task: InstallSSHKey@0
    inputs:
      knownHostsEntry: '$(vmPublicIp)'
      sshPublicKey: '$(ssh_public_key)'
      sshKeySecureFile: 'azure_vm_key'

  # 4. RUN DEPLOYMENT (Clean and Simple)
  - script: |
      ansible-playbook -i inventory.ini site.yml \
        -e "vm_public_ip=$(vmPublicIp)" \
        -e "database_dns=$(db_host)" \
        -e "db_password=$(db_password)"
    displayName: 'Execute Role-Based Deployment'
    env:
      ANSIBLE_HOST_KEY_CHECKING: 'False'

  # 5. VERIFY
  - script: |
      echo "Waiting for service to settle..."
      sleep 10
      echo "Checking [The EpicBook!](http://$(vmPublicIp))"
      curl -s -I http://$(vmPublicIp) | grep "200 OK"
    displayName: 'Final Health Check'