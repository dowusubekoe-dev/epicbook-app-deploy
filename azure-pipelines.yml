trigger: none

resources:
  pipelines:
    - pipeline: infra
      source: infra-epicbook.git
      trigger: true

variables:
  - group: epicbook-secrets
  # Note: These acts as defaults if the artifact load fails
  - name: vmPublicIp
    value: '4.210.183.39'
  - name: db_host
    value: 'epicbook-mysql-0qrmvo.mysql.database.azure.com'

pool:
  name: 'epicbook-deploy-agent'

steps:
  - checkout: self
    displayName: 'Checkout repository'

  # 1. DOWNLOAD INFRA DATA
  - download: infra
    artifact: infra-outputs
    displayName: 'Download infra outputs artifact'

  # 2. LOAD VARIABLES
  - script: |
      set -e
      if [ -f "$(Pipeline.Workspace)/infra/infra-outputs/infra-outputs.env" ]; then
        source "$(Pipeline.Workspace)/infra/infra-outputs/infra-outputs.env"
        echo "##vso[task.setvariable variable=vmPublicIp]$vmPublicIp"
        echo "##vso[task.setvariable variable=db_host]$db_host"
      else
        echo "Infra artifact not found, using default variables"
      fi
    displayName: 'Load infra outputs'

  # 3. PREPARE ENVIRONMENT (Install and SSH)
  - script: |
      sudo apt-get update -y
      sudo apt-get install -y ansible --no-install-recommends
    displayName: 'Install Ansible'

  - task: DownloadSecureFile@1
    name: sshPrivateKey
    inputs:
      secureFile: 'azure_vm_key'

  - script: |
      mkdir -p ~/.ssh
      cp "$(sshPrivateKey.secureFilePath)" ~/.ssh/azure_vm_key
      chmod 600 ~/.ssh/azure_vm_key
    displayName: 'Prepare SSH private key'

  # 4. GENERATE INVENTORY (Fixed Overwrite)
  - script: |
      cat > inventory.ini <<EOF
      [web]
      $(vmPublicIp)

      [web:vars]
      ansible_user=azureuser
      ansible_ssh_private_key_file=$HOME/.ssh/azure_vm_key
      ansible_ssh_common_args='-o StrictHostKeyChecking=no'
      ansible_python_interpreter=/usr/bin/python3
      EOF
      echo "Final Inventory Content:"
      cat inventory.ini
    displayName: 'Generate inventory.ini'

  # 5. RUN DEPLOYMENT
  - script: |
      # Pass both app_user and db info here
      ansible-playbook -i inventory.ini site.yml \
        -e "app_user=azureuser" \
        -e "db_host=$(db_host)" \
        -e "db_password=$(db_password)"
    displayName: 'Run Ansible playbook'

  # 6. VERIFY
  - script: |
      echo "App URL: http://$(vmPublicIp)"
      curl -I --max-time 20 http://$(vmPublicIp)
    displayName: 'Verify deployment'