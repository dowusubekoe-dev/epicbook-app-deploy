trigger: none

resources:
  pipelines:
    - pipeline: infra
      source: infra-epicbook.git
      trigger: true

variables:
  - group: epicbook-secrets
  - name: vmPublicIp
    value: '4.210.183.39'
  - name: db_host
    value: 'epicbook-mysql-0qrmvo.mysql.database.azure.com'

pool:
  name: 'epicbook-deploy-agent'

steps:
  - checkout: self
    displayName: 'Checkout repository'

  - download: infra
    artifact: infra-outputs
    displayName: 'Download infra outputs artifact'

  - script: |
      set -e

      echo "Downloaded artifact contents:"
      ls -R "$(Pipeline.Workspace)"

      source "$(Pipeline.Workspace)/infra/infra-outputs/infra-outputs.env"

      echo "##vso[task.setvariable variable=vmPublicIp]$vmPublicIp"
      echo "##vso[task.setvariable variable=db_host]$db_host"

      echo "VM IP: $vmPublicIp"
      echo "DB Host: $db_host"
    displayName: 'Load infra outputs'

  - script: |
      ansible-playbook -i inventory.ini site.yml \
      -e "app_user=azureuser" \
      -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"
    displayName: 'Run Ansible playbook'

  - task: DownloadSecureFile@1
    name: sshPrivateKey
    displayName: 'Download SSH private key'
    inputs:
      secureFile: 'azure_vm_key'

  - script: |
      echo "Waiting for apt lock to be released..."
      while sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
        echo "APT is locked, waiting..."
        sleep 5
      done

      echo "Lock released"
    displayName: 'Wait for apt lock'

  - script: |
      echo "=== WORKSPACE ROOT ==="
      pwd

      echo "=== FULL TREE ==="
      ls -R $(Build.SourcesDirectory)

      echo "=== ROLES DIR CHECK ==="
      ls -R $(Build.SourcesDirectory)/roles || echo "NO ROLES DIRECTORY FOUND"
    displayName: 'Debug roles visibility'

  - script: |
      ansible-playbook -i inventory.ini playbook.yml -e "app_user=azureuser"
    displayName: 'Run Ansible playbook'

  - script: |
      set -e
      sudo dpkg --configure -a || true
      sudo apt-get clean
      sudo apt-get update -y
      sudo apt-get install -y ansible sshpass --no-install-recommends
    displayName: 'Install Ansible'

  - script: |
      mkdir -p ~/.ssh
      cp "$(sshPrivateKey.secureFilePath)" ~/.ssh/azure_vm_key
      chmod 600 ~/.ssh/azure_vm_key
      ls -l ~/.ssh
    displayName: 'Prepare SSH private key'

  - script: |
      cat > inventory.ini <<EOF
      [web]
      $(vmPublicIp)

      [web:vars]
      ansible_user=azureuser
      ansible_connection=ssh
      ansible_ssh_private_key_file=$HOME/.ssh/azure_vm_key
      ansible_ssh_common_args='-o StrictHostKeyChecking=no'
      ansible_python_interpreter=/usr/bin/python3
      EOF

      echo "Generated inventory:"
      cat inventory.ini
    displayName: 'Generate inventory.ini'

  - script: |
      ansible all -m ping
    displayName: 'Test Ansible connectivity'

  - script: |
      ansible-playbook site.yml \
        -e "db_host=$(db_host)" \
        -e "db_password=$(db_password)"
    displayName: 'Run Ansible playbook'

  - script: |
      set -e
      echo "========================================="
      echo "App URL: http://$(vmPublicIp)"
      echo "========================================="
      curl -I --max-time 20 http://$(vmPublicIp)
      curl --max-time 20 http://$(vmPublicIp) | head
    displayName: 'Verify deployment Url and Nginx'